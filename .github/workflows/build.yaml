name: Build and Release ThermalSight

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python backend ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller numpy opencv-python matplotlib flyr

      - name: Build analyzer executable (onedir)
        run: pyinstaller `
  		--onedir `
  		--noconsole `
 		--name analyzer `
  		--distpath backend/dist `
  		--hidden-import cv2 `
  		--hidden-import matplotlib `
  		--hidden-import matplotlib.backends.backend_agg `
  		--hidden-import numpy `
  		--hidden-import flyr `
  backend/analyzer.py


      # ── Electron frontend ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: ./src
        run: npm install

      - name: Build Vite frontend
        working-directory: ./src
        run: npm run build

      - name: Package with Electron Builder
        working-directory: ./src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
